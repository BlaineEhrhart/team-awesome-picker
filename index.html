<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Awesome Picker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Team Awesome Picker</h1>
    </header>

    <main>
        <!-- Name Input Section -->
        <section class="name-input-section">
            <h2>Team Members</h2>
            <div class="input-row">
                <input type="text" id="nameInput" placeholder="Enter a name..." />
                <button class="btn btn-primary" id="addBtn">Add</button>
            </div>
            <div class="name-chips" id="nameChips"></div>
        </section>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="wheel">Spin the Wheel</button>
            <button class="tab" data-tab="groups">Random Groups</button>
        </div>

        <!-- Spin the Wheel -->
        <div class="tab-content active" id="tab-wheel">
            <div class="wheel-section">
                <div class="wheel-container">
                    <div class="wheel-pointer"></div>
                    <canvas id="wheelCanvas" width="300" height="300"></canvas>
                </div>
                <div class="winner-display" id="winnerDisplay"></div>
                <button class="btn btn-primary" id="spinBtn" disabled>Spin!</button>
            </div>
        </div>

        <!-- Random Groups -->
        <div class="tab-content" id="tab-groups">
            <div class="groups-section">
                <div class="group-controls">
                    <label for="groupSize">Group size:</label>
                    <input type="number" id="groupSize" min="1" value="2" />
                    <button class="btn btn-primary" id="generateBtn" disabled>Generate Groups</button>
                </div>
                <div class="groups-grid" id="groupsGrid">
                    <p class="empty-state">Add names and click Generate to create groups.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
